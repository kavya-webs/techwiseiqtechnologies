<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    TechWiseIQ Technologies — Flutter Web Application
    SEO-optimized index page with Open Graph, Twitter Cards,
    structured data (JSON-LD), and proper viewport meta tags.
  -->

  <!-- Base href — replaced at build time by Flutter CLI -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Character encoding & compatibility -->
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- Viewport — essential for responsive design -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary SEO Meta Tags -->
  <title>TechWiseIQ Technologies | Dubai's Leading IT & AI Solutions Partner</title>
  <meta name="description" content="TechWiseIQ Technologies delivers enterprise-grade software development, cybersecurity, cloud solutions, and IT infrastructure services from Dubai to the Middle East and beyond.">
  <meta name="keywords" content="TechWiseIQ, IT solutions Dubai, software development Dubai, cybersecurity UAE, cloud solutions Middle East, AI solutions, web development, IT infrastructure, data analytics, digital transformation">
  <meta name="author" content="TechWiseIQ Technologies">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="TechWiseIQ Technologies | Dubai's Leading IT & AI Solutions Partner">
  <meta property="og:description" content="Enterprise-grade software development, cybersecurity, cloud solutions, and IT infrastructure services. Empowering businesses across the Middle East.">
  <meta property="og:site_name" content="TechWiseIQ Technologies">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TechWiseIQ Technologies | IT & AI Solutions">
  <meta name="twitter:description" content="Enterprise-grade software development, cybersecurity, and cloud solutions from Dubai.">

  <!-- Theme Color (matches app dark background) -->
  <meta name="theme-color" content="#060B18">
  <meta name="msapplication-navbutton-color" content="#060B18">
  <meta name="apple-mobile-web-app-status-bar-style" content="#060B18">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TechWiseIQ">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Canonical URL (update with production domain) -->
  <!-- <link rel="canonical" href="https://techwiseiq.com/"> -->

  <!-- Web App Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Structured Data — Organization (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "TechWiseIQ Technologies",
    "description": "Dubai-based IT solutions company delivering software development, cybersecurity, cloud solutions, and IT infrastructure services.",
    "url": "https://techwiseiq.com",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Suite 3204, Aspect Tower, Business Bay",
      "addressLocality": "Dubai",
      "addressCountry": "AE"
    },
    "telephone": "+971503150751",
    "email": "hello@techwiseiq.com",
    "sameAs": []
  }
  </script>
</head>
<body>
  <!-- Flutter bootstrap script — loads the compiled Dart application -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
